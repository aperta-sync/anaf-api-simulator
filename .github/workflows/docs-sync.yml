name: ANAF Documentation Sync

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # Needed to create an issue

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Scraper
        env:
          ANAF_NOTIFIER_WEBHOOK: ${{ secrets.ANAF_NOTIFIER_WEBHOOK }}
          B2_BUCKET_NAME: ${{ vars.B2_BUCKET_NAME }}
          B2_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
          B2_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_ACCESS_KEY }}
          B2_ENDPOINT: ${{ vars.B2_ENDPOINT }}
          B2_REGION: ${{ vars.B2_REGION }}
        run: node scripts/anaf-scraper.mjs

      - name: Check for Swagger Changes
        id: git-check
        run: |
          git status --porcelain docs/anaf/scraped/technical/swagger/
          if [ -n "$(git status --porcelain docs/anaf/scraped/technical/swagger/)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
            
            # Create a summary of changed files for the issue body
            git status --porcelain docs/anaf/scraped/technical/swagger/ > changes.txt
            echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
            cat changes.txt >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Issue on Change
        if: steps.git-check.outputs.changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🚨 ANAF API Update Detected" \
            --body "The automated scraper detected changes to the official ANAF OpenAPI specifications. 
            
            **Changed Files:**
            \`\`\`
            ${{ env.CHANGED_FILES }}
            \`\`\`
            
            Please run \`node scripts/anaf-scraper.mjs\` locally with your B2 credentials to fetch the latest specs and update the mock server implementation accordingly." \
            --assignee "${{ github.actor }}"
