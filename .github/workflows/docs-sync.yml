name: ANAF Documentation Sync

on:
  schedule:
    # Run every day at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Allow manual triggering from the Actions tab

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push changes back to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install axios

      - name: Run Scraper
        env:
          ANAF_NOTIFIER_WEBHOOK: ${{ secrets.ANAF_NOTIFIER_WEBHOOK }}
        run: node scripts/anaf-scraper.mjs

      - name: Check for changes
        id: git-check
        run: |
          git add docs/anaf/scraped/
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes=true" >> $GITHUB_OUTPUT
          else
            echo "changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and Push changes
        if: steps.git-check.outputs.changes == 'true'
        run: |
          git config --global user.name "ANAF Documentation Bot"
          git config --global user.email "bot@aperta-sync.ro"
          git commit -m "chore(docs): auto-update ANAF documentation [skip ci]"
          git push
